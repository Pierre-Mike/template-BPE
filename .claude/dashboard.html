<style>
  :root {
    --bg: #0d1117; --bg2: #161b22; --bg3: #21262d; --border: #30363d;
    --text: #e6edf3; --text2: #8b949e; --accent: #58a6ff; --green: #3fb950;
    --orange: #d29922; --red: #f85149; --purple: #bc8cff;

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', monospace;

  h1 { font-size: 1.4em; margin-bottom: 4px; }
  .subtitle { color: var(--text2); font-size: 0.85em; margin-bottom: 20px; }

  /* Stats cards */
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px; margin-bottom: 24px; }
  .stat { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px;
           padding: 16px; }
  .stat-label { color: var(--text2); font-size: 0.75em; text-transform: uppercase;

  .stat-value { font-size: 1.6em; font-weight: 700; margin-top: 4px; }

  .stat-value.tokens { color: var(--accent); }

  .charts { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }

  .bar-chart { display: flex; flex-direction: column; gap: 6px; }
  .bar-row { display: flex; align-items: center; gap: 8px; }
  .bar-label { width: 100px; font-size: 0.8em; text-align: right; color: var(--text2);
                overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .bar-track { flex: 1; height: 20px; background: var(--bg3); border-radius: 4px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width 0.3s; min-width: 2px; }
  .bar-value { width: 60px; font-size: 0.8em; color: var(--text2); }

  /* Sparklines */
  .sparkline { display: flex; align-items: flex-end; gap: 2px; height: 100px; }
  .spark-bar { flex: 1; background: var(--green); border-radius: 2px 2px 0 0;
                min-width: 4px; position: relative; cursor: pointer; opacity: 0.7; }
  .spark-bar:hover { opacity: 1; }
  .spark-bar .tooltip { display: none; position: absolute; bottom: 100%; left: 50%;
                         transform: translateX(-50%); background: var(--bg3); color: var(--text);
                         padding: 4px 8px; border-radius: 4px; font-size: 0.7em;
                         white-space: nowrap; z-index: 10; }
  .spark-bar:hover .tooltip { display: block; }
  .spark-labels { display: flex; justify-content: space-between; margin-top: 4px; }
  .spark-labels span { font-size: 0.65em; color: var(--text2); }

  /* Session table */
  .table-header { display: flex; align-items: center; justify-content: space-between;
                   margin-bottom: 12px; }
  .table-header h2 { font-size: 1.1em; }
  .search { background: var(--bg2); border: 1px solid var(--border); color: var(--text);
             padding: 6px 12px; border-radius: 6px; font-size: 0.85em; width: 250px; }
  .search:focus { outline: none; border-color: var(--accent); }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; padding: 8px 12px; font-size: 0.75em; color: var(--text2);
       text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid var(--border);
       cursor: pointer; user-select: none; }
  th:hover { color: var(--accent); }
  th.sorted { color: var(--accent); }
  td { padding: 8px 12px; font-size: 0.85em; border-bottom: 1px solid var(--border); }
  tr:hover { background: var(--bg2); }
  tr.selected { background: var(--bg3); }
  .session-link { color: var(--accent); cursor: pointer; text-decoration: none; }
  .session-link:hover { text-decoration: underline; }
  .tag { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 0.7em;
          background: var(--bg3); color: var(--text2); margin-right: 4px; }
  .tag.model { background: #1f2a3d; color: var(--accent); }
  .tag.branch { background: #1f2d1f; color: var(--green); }

  /* Session detail panel */
  .detail { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px;
             padding: 20px; margin-top: 16px; display: none; }
  .detail.open { display: block; }
  .detail h3 { margin-bottom: 12px; }
  .detail-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
                  gap: 12px; margin-bottom: 16px; }
  .detail-item .label { color: var(--text2); font-size: 0.75em; }
  .detail-item .value { font-size: 1.1em; font-weight: 600; }
  .tool-list { display: flex; flex-wrap: wrap; gap: 6px; }
  .tool-chip { background: var(--bg3); padding: 4px 10px; border-radius: 12px;
                font-size: 0.8em; }
  .tool-chip .count { color: var(--accent); margin-left: 4px; }

  .footer { margin-top: 32px; text-align: center; color: var(--text2); font-size: 0.7em; }
</style>

const fmt = (n, d=2) => n.toFixed(d);
const fmtK = n => n > 999999 ? fmt(n/1000000,1)+'M' : n > 999 ? fmt(n/1000,1)+'K' : n;
const fmtDur = ms => {
  if (ms < 60000) return fmt(ms/1000,0) + 's';
  if (ms < 3600000) return fmt(ms/60000,1) + 'm';
  return fmt(ms/3600000,1) + 'h';
};
const fmtDate = iso => {
  const d = new Date(iso);
  return d.toLocaleDateString('en-US', { month:'short', day:'numeric' }) + ' ' +
         d.toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit', hour12:false });
};
const dayKey = iso => iso.slice(0,10);

let totalCost=0, totalInput=0, totalOutput=0, totalCacheRead=0, totalCacheCreate=0;
const toolAgg={}, modelAgg={}, dailyCosts={}, dailyCounts={};

DATA.forEach(s => {
  totalCost += s.cost;
  totalInput += s.input_tokens;
  totalOutput += s.output_tokens;
  totalCacheRead += s.cache_read_tokens;
  totalCacheCreate += s.cache_create_tokens;
  Object.entries(s.tools||{}).forEach(([k,v]) => toolAgg[k]=(toolAgg[k]||0)+v);
  Object.entries(s.models||{}).forEach(([k,v]) => modelAgg[k]=(modelAgg[k]||0)+v);
  const dk = dayKey(s.date);
  dailyCosts[dk] = (dailyCosts[dk]||0) + s.cost;
  dailyCounts[dk] = (dailyCounts[dk]||0) + 1;
});

document.getElementById('projectName').textContent = 'Users/pierre/mikel/Github/template/BPE — ' + DATA.length + ' sessions';
document.getElementById('genTime').textContent = new Date().toLocaleString();

document.getElementById('stats').innerHTML = `
  <div class="stat"><div class="stat-label">Total Cost</div>
    <div class="stat-value cost">$${fmt(totalCost)}</div></div>
  <div class="stat"><div class="stat-label">Sessions</div>
    <div class="stat-value sessions">${DATA.length}</div></div>
  <div class="stat"><div class="stat-label">Output Tokens</div>
    <div class="stat-value tokens">${fmtK(totalOutput)}</div></div>
  <div class="stat"><div class="stat-label">Input Tokens</div>
    <div class="stat-value tokens">${fmtK(totalInput)}</div></div>
  <div class="stat"><div class="stat-label">Cache Read</div>
    <div class="stat-value tokens">${fmtK(totalCacheRead)}</div></div>
  <div class="stat"><div class="stat-label">Cache Create</div>
    <div class="stat-value tokens">${fmtK(totalCacheCreate)}</div></div>
`;

function renderBarChart(container, data, color) {
  const sorted = Object.entries(data).sort((a,b)=>b[1]-a[1]);
  const max = sorted[0]?.[1] || 1;
  container.innerHTML = sorted.slice(0,10).map(([k,v]) => `
    <div class="bar-row">
      <div class="bar-label" title="${k}">${k}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${v/max*100}%;background:${color}"></div></div>
      <div class="bar-value">${fmtK(v)}</div>
    </div>
  `).join('');
}
renderBarChart(document.getElementById('toolChart'), toolAgg, 'var(--accent)');
renderBarChart(document.getElementById('modelChart'), modelAgg, 'var(--purple)');

function renderSparkline(container, labelContainer, data, color, fmtFn) {
  const days = Object.keys(data).sort();
  if (!days.length) return;
  const max = Math.max(...Object.values(data));
  container.innerHTML = days.map(d => {
    const h = max > 0 ? (data[d]/max*100) : 0;
    return `<div class="spark-bar" style="height:${Math.max(h,3)}%;background:${color}">
      <div class="tooltip">${d}: ${fmtFn(data[d])}</div></div>`;
  }).join('');
  labelContainer.innerHTML = `<span>${days[0]}</span><span>${days[days.length-1]}</span>`;
}
renderSparkline(document.getElementById('dailyCost'), document.getElementById('dailyLabels'),
                dailyCosts, 'var(--green)', v=>'$'+fmt(v));
renderSparkline(document.getElementById('dailySessions'), document.getElementById('dailySessionLabels'),
                dailyCounts, 'var(--orange)', v=>v+' sessions');

let sortKey = 'date', sortDir = -1, filterText = '';
const getSorted = () => [...DATA]
  .filter(s => {
    if (!filterText) return true;
    const q = filterText.toLowerCase();
    return (s.slug||'').toLowerCase().includes(q) ||
           (s.git_branch||'').toLowerCase().includes(q) ||
           Object.keys(s.tools||{}).some(t=>t.toLowerCase().includes(q)) ||
           Object.keys(s.models||{}).some(m=>m.toLowerCase().includes(q));
  })
  .sort((a,b) => {
    let va=a[sortKey], vb=b[sortKey];
    if (typeof va==='string') return sortDir * va.localeCompare(vb);
    return sortDir * ((va||0)-(vb||0));
  });

function renderTable() {
  const rows = getSorted();
  document.getElementById('sessionCount').textContent = rows.length;
  document.querySelectorAll('th').forEach(th => {
    th.classList.toggle('sorted', th.dataset.sort === sortKey);
  });
  document.getElementById('sessionTable').innerHTML = rows.map(s => `
    <tr data-id="${s.id}" onclick="showDetail('${s.id}')">
      <td><span class="session-link">${s.slug || s.id.slice(0,8)}</span></td>
      <td>${fmtDate(s.date)}</td>
      <td>$${fmt(s.cost, 3)}</td>
      <td>${fmtK(s.output_tokens)}</td>
      <td>${s.user_turns}</td>
      <td>${s.duration_ms ? fmtDur(s.duration_ms) : '\u2014'}</td>
      <td>${Object.keys(s.models||{}).map(m=>`<span class="tag model">${m.replace('claude-','')}</span>`).join('')}</td>
      <td>${s.git_branch ? `<span class="tag branch">${s.git_branch}</span>` : '\u2014'}</td>
    </tr>
  `).join('');
}

document.querySelectorAll('th[data-sort]').forEach(th => {
  th.addEventListener('click', () => {
    if (sortKey === th.dataset.sort) sortDir *= -1;
    else { sortKey = th.dataset.sort; sortDir = -1; }
    renderTable();
  });
});
document.getElementById('search').addEventListener('input', e => {
  filterText = e.target.value;
  renderTable();
});

function showDetail(id) {
  const s = DATA.find(x=>x.id===id);
  if (!s) return;
  document.querySelectorAll('tr').forEach(r=>r.classList.toggle('selected', r.dataset.id===id));
  const det = document.getElementById('detail');
  det.classList.add('open');
  det.innerHTML = `
    <h3>${s.slug || s.id.slice(0,8)}</h3>
    <div class="detail-grid">
      <div class="detail-item"><div class="label">Session ID</div><div class="value" style="font-size:0.8em;word-break:break-all">${s.id}</div></div>
      <div class="detail-item"><div class="label">Started</div><div class="value">${fmtDate(s.date)}</div></div>
      <div class="detail-item"><div class="label">Ended</div><div class="value">${fmtDate(s.date_end)}</div></div>
      <div class="detail-item"><div class="label">Duration</div><div class="value">${s.duration_ms ? fmtDur(s.duration_ms) : '\u2014'}</div></div>
      <div class="detail-item"><div class="label">Cost</div><div class="value cost">$${fmt(s.cost, 4)}</div></div>
      <div class="detail-item"><div class="label">Input Tokens</div><div class="value">${fmtK(s.input_tokens)}</div></div>
      <div class="detail-item"><div class="label">Output Tokens</div><div class="value">${fmtK(s.output_tokens)}</div></div>
      <div class="detail-item"><div class="label">Cache Read</div><div class="value">${fmtK(s.cache_read_tokens)}</div></div>
      <div class="detail-item"><div class="label">Cache Create</div><div class="value">${fmtK(s.cache_create_tokens)}</div></div>
      <div class="detail-item"><div class="label">User Turns</div><div class="value">${s.user_turns}</div></div>
      <div class="detail-item"><div class="label">Assistant Turns</div><div class="value">${s.assistant_turns}</div></div>
      <div class="detail-item"><div class="label">File Size</div><div class="value">${fmtK(s.file_size)}B</div></div>
      <div class="detail-item"><div class="label">Branch</div><div class="value">${s.git_branch||'\u2014'}</div></div>
      <div class="detail-item"><div class="label">CWD</div><div class="value" style="font-size:0.75em">${s.cwd||'\u2014'}</div></div>
      <div class="detail-item"><div class="label">Version</div><div class="value">${s.version||'\u2014'}</div></div>
    </div>
    <h4 style="margin-bottom:8px;font-size:0.85em;color:var(--text2)">Tool Calls</h4>
    <div class="tool-list">
      ${Object.entries(s.tools||{}).sort((a,b)=>b[1]-a[1]).map(([k,v])=>
        `<div class="tool-chip">${k}<span class="count">\u00d7${v}</span></div>`
      ).join('') || '<span style="color:var(--text2)">No tool calls</span>'}
    </div>
  `;
  det.scrollIntoView({ behavior:'smooth', block:'nearest' });
}

renderTable();
</script>
