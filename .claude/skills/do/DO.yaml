# DO.yaml — delegation tree for /do skill.
#
# Config only. Spawn mechanism is implicit:
#   Session    → Orchestrator : claude -p + worktree
#   Orchestra. → Lead         : TaskCreate (subagent_type = <lead>-lead)
#   Lead       → Specialist   : claude -p scoped (via .claude/tools/spawn/run)
#
# Specialist `type` maps to profile hooks:
#   coder    — Write/Edit only under scope, Bash denied
#   reviewer — read-only (no Write/Edit/Bash)

orchestrator:
  tools: Read,Glob,Grep,Bash
  skills: expertise,concise
  model: sonnet
  prompt: >
    Read codebase for context. Dispatch leads via TaskCreate using subagent_type
    <lead>-lead. Sequence dependent leads (backend before frontend). Review
    results. Return summary when all work is done.

leads:

  backend:
    tools: Read,Glob,Grep,Bash
    skills: effect-ts,expertise
    model: sonnet
    specialists:

      feature-coder:
        type: coder
        scope: apps/backend/src/backend/features/
        description: >
          Feature slice work. Each feature lives in features/<name>/ with
          tier-suffixed files: <name>.core.ts (pure), <name>.repo.ts (Effect
          service), <name>.migration.ts (SQL DDL), <name>.routes.ts (Hono +
          Effect.gen), <name>.fixture.ts (test doubles). Co-locate tests as
          <name>.<tier>.test.ts.
        tools: Read,Glob,Grep,Write,Edit
        skills: effect-ts,expertise,concise
        model: sonnet
        boundaries:
          - "*.core.ts: no I/O. Allowed: effect, @effect/schema, sibling *.core.ts. Forbidden: ../../platform/, sibling repo/routes/migration/fixture"
          - "*.repo.ts: Context.Tag service. Allowed: effect, @effect/schema, ./<name>.core.ts (types), ../../platform/d1-types.ts, cloudflare:workers"
          - "*.migration.ts: SQL DDL constants only. No imports beyond constant exports."
          - "*.routes.ts: Hono + Effect.gen orchestration. No business logic. Allowed: ./<name>.core.ts, ./<name>.repo.ts, ../../platform/effect-handler.ts, ../../platform/route-types.ts"
          - "*.fixture.ts: test doubles, only importable from *.test.ts files"
          - "Cross-feature imports forbidden — share via platform/ or compose in api.ts"
          - "Adding a new slice: create features/<name>/, register the route in apps/backend/src/backend/api.ts (composition root)"

      platform-coder:
        type: coder
        scope: apps/backend/src/backend/platform/
        description: >
          Feature-agnostic platform infrastructure. One file per concern:
          config (Effect Service for env), d1-types (Cloudflare D1
          declarations), effect-handler (defineRoute factory — pure runtime
          glue), worker-bindings (Hono Bindings type), wrangler-bindings,
          route-types, agents-conventions, boundary-rules, plus deploy/CI
          constants (deploy-workflow, github-secrets, wrangler-envs,
          wrangler-examples).
        tools: Read,Glob,Grep,Write,Edit
        skills: effect-ts,expertise,concise
        model: sonnet
        boundaries:
          - "platform/ must not import from features/ — enforced by depcruise (platform-has-no-feature-deps)"
          - "effect-handler.ts is pure runtime glue — no feature deps, no business logic (effect-handler-stays-pure-glue)"
          - "Live + Test layers for every Effect service"
          - "Boundary rule names live in boundary-rules.ts and must match .dependency-cruiser.cjs in lockstep"

      composition-coder:
        type: coder
        scope: apps/backend/src/backend/
        description: >
          Composition root: api.ts (Hono app assembly — thin registry of
          feature route modules) and main.ts (Cloudflare Workers entry).
          Use feature-coder for slice work, platform-coder for infra.
        tools: Read,Glob,Grep,Write,Edit
        skills: effect-ts,expertise,concise
        model: sonnet
        boundaries:
          - "Edit only api.ts and main.ts. Do not modify files inside features/ or platform/"
          - "api.ts is a thin registry — no handler logic, no Effect.runPromise, no I/O"
          - "Each new feature route must be wired here"

      reviewer:
        type: reviewer
        scope: apps/backend/src/backend/
        description: "Read-only review of backend code."
        tools: Read,Glob,Grep
        skills: expertise,concise
        model: haiku

  frontend:
    tools: Read,Glob,Grep,Bash
    skills: expertise
    model: sonnet
    specialists:

      coder:
        type: coder
        scope: apps/frontend/src/
        description: "Astro SSR pages, typed api client from backend AppType."
        tools: Read,Glob,Grep,Write,Edit
        skills: expertise,concise
        model: sonnet

      reviewer:
        type: reviewer
        scope: apps/frontend/src/
        description: "Read-only review of frontend code."
        tools: Read,Glob,Grep
        skills: expertise,concise
        model: haiku

  platform:
    tools: Read,Glob,Grep,Bash
    skills: ts-axioms,expertise
    model: sonnet
    specialists:

      coder:
        type: coder
        scope: .github/workflows/
        description: "CI workflows, build/test/deploy pipelines."
        tools: Read,Glob,Grep,Write,Edit
        skills: ts-axioms,expertise,concise
        model: sonnet

      reviewer:
        type: reviewer
        scope: .github/
        description: "Read-only review of CI + platform config."
        tools: Read,Glob,Grep
        skills: ts-axioms,expertise,concise
        model: haiku
