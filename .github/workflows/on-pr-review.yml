name: AI Review

on:
  pull_request:
    types: [opened, synchronize]
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  issues: write
  statuses: write

jobs:
  ai-review:
    name: AI Review
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Skip for human PRs
        id: bot-check
        run: |
          if [ "${{ github.actor }}" != "github-actions[bot]" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Human PR — AI review not applicable."
            # Post success status so required check passes
            curl -s -X POST \
              -H "Authorization: token ${{ secrets.PAT }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/statuses/${{ github.event.pull_request.head.sha }}" \
              -d '{"state":"success","context":"AI Review","description":"Skipped — human PR"}'
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.bot-check.outputs.skip != 'true'
        with:
          fetch-depth: 0

      - name: Extract issue number from PR body
        if: steps.bot-check.outputs.skip != 'true'
        id: issue
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          ISSUE_NUMBER=$(echo "$PR_BODY" | grep -oP 'Closes #\K[0-9]+' | head -1)
          if [ -z "$ISSUE_NUMBER" ]; then
            echo "No linked issue found in PR body — skipping review."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "number=$ISSUE_NUMBER" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        if: steps.bot-check.outputs.skip != 'true' && steps.issue.outputs.skip != 'true'
        with:
          node-version: "22"

      - uses: oven-sh/setup-bun@v2
        if: steps.bot-check.outputs.skip != 'true' && steps.issue.outputs.skip != 'true'

      - uses: actions/cache@v4
        if: steps.bot-check.outputs.skip != 'true' && steps.issue.outputs.skip != 'true'
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies
        if: steps.bot-check.outputs.skip != 'true' && steps.issue.outputs.skip != 'true'
        run: bun install --frozen-lockfile

      - name: AI Review
        if: steps.bot-check.outputs.skip != 'true' && steps.issue.outputs.skip != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          allowed_bots: '*'
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: '--allowedTools "Bash(gh:*),Read,Glob,Grep"'
          show_full_output: true
          prompt: |
            You are a code reviewer for a PR implementing slice issue #${{ steps.issue.outputs.number }}.

            ## Step 1 — Fetch context

            Fetch the slice issue to understand what was requested:
            gh issue view ${{ steps.issue.outputs.number }} --repo ${{ github.repository }}

            Fetch the PR diff:
            gh pr diff ${{ github.event.pull_request.number }} --repo ${{ github.repository }}

            ## Step 2 — Review checklist

            Evaluate the PR against ALL of the following criteria:

            ### 1. Scope guard
            Are all changes justified by the slice's acceptance criteria?
            Small incidental improvements (typo fixes, renaming for clarity) are acceptable.
            Unrelated features, refactors, or changes beyond the slice scope are NOT acceptable.

            ### 2. Architecture compliance
            - Pure logic in `core/` — no I/O, no side effects, no imports from `infra/` or `shell/`
            - Effect services in `infra/` with `Context.Tag` + `Layer`
            - Hono routes + `Effect.gen` coordinators in `shell/`
            - `Effect.runPromise` only in `shell/` and `main.ts`
            - No try/catch — Effect-TS for all error handling
            - No classes outside framework code
            - Named parameters for 3+ params

            ### 3. Security review
            - No command injection, XSS, SQL injection
            - No hardcoded secrets or credentials
            - No unsafe input handling at system boundaries
            - No `any` types that bypass type safety

            ### 4. Quality judgment
            - No over-engineering or unnecessary abstractions
            - No dead code or unused imports
            - No mock frameworks — Effect test Layers only
            - Co-located tests present for new source files
            - Tests are meaningful, not just boilerplate

            ## Step 3 — Verdict

            If ALL checks pass:
            - Post a PR comment with a brief summary of what was reviewed and approval
            - Then report: VERDICT: APPROVE

            If ANY check fails:
            - Post a PR comment explaining each failure clearly
            - Then report: VERDICT: REJECT
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}

      - name: Set review status
        if: steps.bot-check.outputs.skip != 'true' && steps.issue.outputs.skip != 'true' && success()
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}
        run: |
          # Read the Claude output to determine verdict
          # The action outputs are in the PR comments — check the latest bot comment
          LATEST_COMMENT=$(gh pr view ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --json comments --jq '[.comments[] | select(.author.login == "github-actions")] | last | .body // ""')

          if echo "$LATEST_COMMENT" | grep -q "VERDICT: APPROVE"; then
            gh api repos/${{ github.repository }}/statuses/${{ github.event.pull_request.head.sha }} \
              -f state=success \
              -f context="AI Review" \
              -f description="AI review passed"
            echo "Review approved."
          else
            gh api repos/${{ github.repository }}/statuses/${{ github.event.pull_request.head.sha }} \
              -f state=failure \
              -f context="AI Review" \
              -f description="AI review rejected — needs human intervention"

            # Extract issue number and label needs-human
            ISSUE_NUMBER="${{ steps.issue.outputs.number }}"
            gh issue edit "$ISSUE_NUMBER" --repo ${{ github.repository }} --add-label needs-human
            # Remove slice label to prevent retry
            gh issue edit "$ISSUE_NUMBER" --repo ${{ github.repository }} --remove-label slice || true
            echo "Review rejected — labeled needs-human."
          fi

      - name: Set review status on failure
        if: steps.bot-check.outputs.skip != 'true' && steps.issue.outputs.skip != 'true' && failure()
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}
        run: |
          gh api repos/${{ github.repository }}/statuses/${{ github.event.pull_request.head.sha }} \
            -f state=error \
            -f context="AI Review" \
            -f description="AI review workflow errored"
