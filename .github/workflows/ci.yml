name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: oven-sh/setup-bun@v2
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - run: bun run typecheck

  lint:
    name: Biome CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - run: bun run lint:ci

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - run: bun test --coverage

  colocated-tests:
    name: Enforce Co-located Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enforce co-located tests
        run: |
          found=0
          while IFS= read -r f; do
            src="${f%.test.ts}.ts"
            if [ ! -f "$src" ]; then
              echo "Orphaned test: $f"
              found=1
            fi
          done < <(find apps -name "*.test.ts")
          exit $found

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  protected-file-check:
    name: Protected File Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Skip for human PRs
        if: github.actor != 'github-actions[bot]'
        run: echo "Human PR — protected file check not applicable."
      - uses: actions/checkout@v4
        if: github.actor == 'github-actions[bot]'
        with:
          fetch-depth: 0
      - name: Reject bot PRs that touch protected files
        if: github.actor == 'github-actions[bot]'
        run: |
          PROTECTED_PATTERNS=(
            "AGENTS.md"
            ".claude/"
            "turbo.json"
            ".github/"
            "biome.json"
            "lefthook.yml"
            "tsconfig.json"
            "tsconfig.base.json"
            "package.json"
            "wrangler.toml"
          )

          CHANGED=$(git diff --name-only origin/main...HEAD)
          VIOLATIONS=""

          for file in $CHANGED; do
            for pattern in "${PROTECTED_PATTERNS[@]}"; do
              case "$file" in
                $pattern|$pattern*|*/$pattern)
                  VIOLATIONS="$VIOLATIONS\n  - $file (matches $pattern)"
                  ;;
              esac
            done
          done

          if [ -n "$VIOLATIONS" ]; then
            echo "::error::Bot PR touches protected files:$VIOLATIONS"
            exit 1
          fi

          echo "No protected files touched."

  build:
    name: Build
    needs: [type-check, lint, test, colocated-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: oven-sh/setup-bun@v2
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - run: bun run build
