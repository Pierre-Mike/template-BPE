name: PRD → Slices

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  prd-to-slices:
    name: PRD → Slices
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'prd')
    timeout-minutes: 30

    steps:
      - name: Skip if slices already exist
        id: dedup
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh api "repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/sub_issues" --jq '[.[] | select(.labels[].name == "slice" or .labels[].name == "slice-pending")] | length' 2>/dev/null || echo "0")
          if [ "$EXISTING" -gt "0" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Slice sub-issues already exist ($EXISTING found) — skipping."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.dedup.outputs.skip != 'true'

      - name: Ensure labels exist
        if: steps.dedup.outputs.skip != 'true'
        run: |
          gh label create slice --color e4e669 --description "Vertical implementation slice" --force
          gh label create slice-pending --color d4c5f9 --description "Slice waiting on blockers" --force
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Break PRD into vertical slices
        if: steps.dedup.outputs.skip != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          allowed_bots: '*'
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: '--allowedTools "Bash(gh:*),Bash(git:*),Read,Write,Glob,Grep,WebSearch"'
          show_full_output: true
          prompt: |
            Fetch GitHub issue #${{ github.event.issue.number }} with:
            gh issue view ${{ github.event.issue.number }} --comments

            This is a PRD. Break it into tracer-bullet vertical slices:
            1. Explore the codebase to understand the current architecture
            2. Break the PRD into thin end-to-end slices (NOT horizontal layers)
            3. Determine dependencies between slices before creating any issue

            Use a two-pass approach so every issue has correct **Blocked by:** and **Unblocks:** fields:

            PASS 1 — Create all slice issues (blockers first).
            - Include **Blocked by:** #X, #Y at the top of the body (omit if none).
            - Omit **Unblocks:** for now (dependent issue numbers are not known yet).
            - Label: no blockers → "slice", has blockers → "slice-pending".
            - Record a mapping of logical slice name → issue number as you go.
            REPO=$(gh repo view --json nameWithOwner -q .nameWithOwner)
            Write each slice body to /tmp/slice-<n>.md and use --body-file to avoid shell escaping issues:
            SLICE_URL=$(gh issue create --title "Slice: <title>" --body-file /tmp/slice-<n>.md --label <slice|slice-pending>)
            SLICE_NUMBER=$(echo "$SLICE_URL" | grep -o '[0-9]*$')
            gh api repos/$REPO/issues/${{ github.event.issue.number }}/sub_issues \
              --method POST --field sub_issue_id=$SLICE_NUMBER

            PASS 2 — Back-fill **Unblocks:** on every blocker issue.
            - For each slice that blocks others, fetch its current body, append **Unblocks:** #X, #Y
              (using the real issue numbers from Pass 1), write to /tmp/edit-<n>.md, and run:
            gh issue edit <NUMBER> --body-file /tmp/edit-<n>.md

            Do not ask for approval — create and edit the issues directly.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Report failure
        if: failure() && steps.dedup.outputs.skip != 'true'
        run: |
          gh issue comment ${{ github.event.issue.number }} --body "❌ **Skill chain failed** (PRD → Slices)

          Workflow logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
