name: PRD → Batch Implementation

on:
  repository_dispatch:
    types: [implement-prd]

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  implement-all-slices:
    name: Implement all slices
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Fetch slices and build implementation plan
        id: plan
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}
          PRD_NUMBER: ${{ github.event.client_payload.prd_number }}
        run: |
          REPO="${{ github.repository }}"

          # Fetch all sub-issues of the PRD that are slices
          SLICE_NUMBERS=$(gh api "repos/$REPO/issues/$PRD_NUMBER/sub_issues" \
            --jq '[.[] | select((.labels[].name == "slice") or (.labels[].name == "slice-pending")) | .number]')

          if [ "$SLICE_NUMBERS" = "[]" ] || [ -z "$SLICE_NUMBERS" ]; then
            echo "No slice sub-issues found for PRD #$PRD_NUMBER"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "Found slices: $SLICE_NUMBERS"

          # For each slice, extract blocked-by numbers
          echo '{}' > /tmp/deps.json
          for NUM in $(echo "$SLICE_NUMBERS" | jq -r '.[]'); do
            BODY=$(gh issue view "$NUM" --repo "$REPO" --json body -q .body)

            # Extract blocked-by section only (avoid false positives from contextual refs)
            BLOCKED_SECTION=$(echo "$BODY" \
              | sed -n '/^## Blocked by/,/^## /{ /^## Blocked by/d; /^## /d; p; }; /^\*\*Blocked by[:\*]/{ s/^\*\*Blocked by[:\*]*//; p; }')
            BLOCKERS=$(echo "$BLOCKED_SECTION" | grep -oE '#[0-9]+' | grep -oE '[0-9]+' | sort -u | tr '\n' ',' | sed 's/,$//')

            # Only keep blockers that are in our slice set
            VALID_BLOCKERS=""
            for B in $(echo "$BLOCKERS" | tr ',' ' '); do
              if [ -n "$B" ] && echo "$SLICE_NUMBERS" | jq -e "index($B)" > /dev/null 2>&1; then
                if [ -n "$VALID_BLOCKERS" ]; then
                  VALID_BLOCKERS="$VALID_BLOCKERS,$B"
                else
                  VALID_BLOCKERS="$B"
                fi
              fi
            done

            jq --argjson num "$NUM" --arg deps "$VALID_BLOCKERS" \
              '. + {($num | tostring): $deps}' /tmp/deps.json > /tmp/deps2.json
            mv /tmp/deps2.json /tmp/deps.json
          done

          echo "Dependency map:"
          cat /tmp/deps.json | jq .

          # Topological sort via Kahn's algorithm
          python3 << 'PYEOF' > /tmp/slice-order.json
          import json
          from collections import defaultdict, deque

          with open('/tmp/deps.json') as f:
              deps = json.load(f)

          nodes = set(deps.keys())
          in_degree = {n: 0 for n in nodes}
          graph = defaultdict(list)

          for node, dep_str in deps.items():
              if dep_str:
                  for dep in dep_str.split(','):
                      dep = dep.strip()
                      if dep in nodes:
                          graph[dep].append(node)
                          in_degree[node] += 1

          queue = deque(sorted([n for n in nodes if in_degree[n] == 0]))
          order = []

          while queue:
              node = queue.popleft()
              order.append(int(node))
              for neighbor in sorted(graph[node]):
                  in_degree[neighbor] -= 1
                  if in_degree[neighbor] == 0:
                      queue.append(neighbor)

          # Any remaining nodes have cycles — append at end
          remaining = [int(n) for n in nodes if int(n) not in order]
          order.extend(sorted(remaining))

          result = []
          for num in order:
              dep_str = deps.get(str(num), '')
              blockers = [int(x.strip()) for x in dep_str.split(',') if x.strip()] if dep_str else []
              result.append({"number": num, "blocked_by": blockers})

          print(json.dumps(result))
          PYEOF

          echo "Slice implementation order:"
          cat /tmp/slice-order.json | jq .

          PRD_TITLE=$(gh issue view "$PRD_NUMBER" --repo "$REPO" --json title -q .title)
          echo "prd_title=$PRD_TITLE" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        if: steps.plan.outputs.skip != 'true'
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT }}

      - uses: actions/setup-node@v4
        if: steps.plan.outputs.skip != 'true'
        with:
          node-version: "22"

      - uses: oven-sh/setup-bun@v2
        if: steps.plan.outputs.skip != 'true'

      - uses: actions/cache@v4
        if: steps.plan.outputs.skip != 'true'
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Install dependencies and hooks
        if: steps.plan.outputs.skip != 'true'
        run: |
          bun install --frozen-lockfile
          bunx lefthook install

      - name: Install gitleaks
        if: steps.plan.outputs.skip != 'true'
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz \
            | tar xz -C /usr/local/bin gitleaks

      - name: Configure git
        if: steps.plan.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create implementation branch
        if: steps.plan.outputs.skip != 'true'
        env:
          PRD_NUMBER: ${{ github.event.client_payload.prd_number }}
        run: git checkout -b "prd/issue-$PRD_NUMBER"

      - name: Implement all slices
        if: steps.plan.outputs.skip != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          allowed_bots: '*'
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: '--allowedTools "Bash(gh:*),Bash(git:*),Bash(bun:*),Bash(cat:*),Bash(python3:*),Read,Write,Edit,Glob,Grep,WebSearch"'
          show_full_output: true
          prompt: |
            You are implementing ALL slices for PRD #${{ github.event.client_payload.prd_number }}.
            You are on branch prd/issue-${{ github.event.client_payload.prd_number }}.

            Read the implementation plan:
            cat /tmp/slice-order.json

            This JSON array contains slices in TOPOLOGICAL ORDER (dependencies first).
            Each entry: { "number": <issue_number>, "blocked_by": [<issue_numbers>] }

            ## Process

            Maintain a list of SKIPPED slice numbers (starts empty).

            For each slice in order:

            1. **Check skip cascade**: if ANY of its `blocked_by` numbers are in the SKIPPED list,
               skip this slice. Add it to the SKIPPED list. Post a comment on the issue:
               gh issue comment <number> --body "⏭️ Skipped — dependency was skipped in batch run."
               Then move to the next slice.

            2. **Fetch the issue**: gh issue view <number> --comments

            3. **Implement using TDD**:
               - Plan red-green-refactor cycles from the acceptance criteria
               - For each behavior: write a failing test (RED), write minimal code to pass (GREEN)
               - Refactor after all tests pass

            4. **Run full checks**: bun run check
               - If checks fail, fix the issues. You have up to 3 fix attempts per slice.
               - If still failing after 3 attempts: add to SKIPPED list, revert uncommitted changes
                 with `git checkout -- .`, and post a comment:
                 gh issue comment <number> --body "❌ Skipped after 3 attempts — needs human intervention."
                 Then move to the next slice.

            5. **Commit**: git add -A && git commit -m "feat: implement #<number> — <short title>"

            6. **Close the issue**:
               gh issue close <number> --comment "✅ Implemented in batch run."

            ## Important rules

            - Each slice gets its OWN commit. Never combine multiple slices in one commit.
            - Process slices strictly in the given order.
            - Do NOT create a PR — the workflow handles that after you finish.
            - Do NOT push — the workflow handles that too.
            - If ALL slices end up skipped, just exit cleanly.
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}

      - name: Push branch and create PR
        if: steps.plan.outputs.skip != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}
          PRD_NUMBER: ${{ github.event.client_payload.prd_number }}
          PRD_TITLE: ${{ steps.plan.outputs.prd_title }}
        run: |
          BRANCH="prd/issue-$PRD_NUMBER"
          REPO="${{ github.repository }}"

          # Check if there are any commits beyond main
          COMMIT_COUNT=$(git rev-list --count origin/main..HEAD)
          if [ "$COMMIT_COUNT" -eq "0" ]; then
            echo "No commits produced — all slices were skipped or failed."
            gh issue comment "$PRD_NUMBER" --repo "$REPO" --body "⚠️ **Batch implementation produced no commits** — all slices were skipped or failed.

          Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            exit 0
          fi

          # Rebase on latest main before pushing
          git fetch origin main
          git rebase origin/main || {
            echo "Rebase conflict — pushing as-is"
            git rebase --abort
          }

          # Push branch
          git push -u origin "$BRANCH"

          # Collect successfully closed slice issues for PR body
          CLOSED_ISSUES=$(gh api "repos/$REPO/issues/$PRD_NUMBER/sub_issues" \
            --jq '[.[] | select(.state == "closed") | select(any(.labels[]; .name == "slice" or .name == "slice-pending")) | .number] | unique | .[]' 2>/dev/null || true)

          CLOSES_LINES=""
          for NUM in $CLOSED_ISSUES; do
            CLOSES_LINES="${CLOSES_LINES}Closes #${NUM}
          "
          done

          # Collect skipped/open slice issues
          OPEN_ISSUES=$(gh api "repos/$REPO/issues/$PRD_NUMBER/sub_issues" \
            --jq '[.[] | select(.state == "open") | select(any(.labels[]; .name == "slice" or .name == "slice-pending")) | .number] | unique | .[]' 2>/dev/null || true)

          SKIPPED_LINES=""
          for NUM in $OPEN_ISSUES; do
            SKIPPED_LINES="${SKIPPED_LINES}- #${NUM}
          "
          done

          # Build PR body
          cat > /tmp/pr-body.md << EOF
          Implements PRD #$PRD_NUMBER — $PRD_TITLE

          $CLOSES_LINES
          EOF

          if [ -n "$SKIPPED_LINES" ]; then
            cat >> /tmp/pr-body.md << EOF

          ## Skipped slices (need manual implementation)
          $SKIPPED_LINES
          EOF
          fi

          # Create PR
          gh pr create \
            --title "Implement: $PRD_TITLE" \
            --body-file /tmp/pr-body.md \
            --head "$BRANCH" \
            --base main

          # Enable auto-merge
          gh pr merge --auto --squash "$BRANCH"

          echo "PR created and auto-merge enabled."

      - name: Report failure
        if: failure()
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}
          PRD_NUMBER: ${{ github.event.client_payload.prd_number }}
        run: |
          gh issue comment "$PRD_NUMBER" --repo "${{ github.repository }}" \
            --body "❌ **Batch implementation failed**

          Workflow logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
