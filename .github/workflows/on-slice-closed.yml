name: Slice closed → Unblock dependents

on:
  issues:
    types: [closed]

permissions:
  issues: write

jobs:
  unblock:
    name: Unblock dependent slices
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'slice')

    steps:
      - name: Promote unblocked slice-pending issues
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLOSED_NUMBER: ${{ github.event.issue.number }}
        run: |
          REPO="${{ github.repository }}"

          # Find all open issues with the slice-pending label
          PENDING=$(gh issue list --repo "$REPO" --label slice-pending --state open --json number --jq '.[].number')

          if [ -z "$PENDING" ]; then
            echo "No slice-pending issues — nothing to do."
            exit 0
          fi

          for CANDIDATE in $PENDING; do
            echo "Checking slice-pending #$CANDIDATE..."

            # Extract blocker issue numbers from the body
            # Supports both "**Blocked by:** #X, #Y" and "## Blocked by\n- #X\n- #Y" formats
            CANDIDATE_BODY=$(gh issue view "$CANDIDATE" --repo "$REPO" --json body -q .body)
            BLOCKERS=$(echo "$CANDIDATE_BODY" | grep -oE '#[0-9]+' | grep -oE '[0-9]+' | sort -u)

            if [ -z "$BLOCKERS" ]; then
              echo "  No blockers found in body — skipping (may need manual review)."
              continue
            fi

            ALL_CLOSED=true
            for BLOCKER in $BLOCKERS; do
              # Skip self-references and non-slice issues
              if [ "$BLOCKER" = "$CANDIDATE" ]; then
                continue
              fi

              # Only check issues that have slice or slice-pending labels
              LABELS=$(gh issue view "$BLOCKER" --repo "$REPO" --json labels --jq '.labels[].name' 2>/dev/null || true)
              if ! echo "$LABELS" | grep -qE '^(slice|slice-pending)$'; then
                continue
              fi

              STATE=$(gh issue view "$BLOCKER" --repo "$REPO" --json state -q .state 2>/dev/null || echo "OPEN")
              if [ "$STATE" != "CLOSED" ]; then
                echo "  Blocker #$BLOCKER is still open — #$CANDIDATE stays pending."
                ALL_CLOSED=false
                break
              fi
            done

            if [ "$ALL_CLOSED" = "true" ]; then
              echo "All blockers resolved — promoting #$CANDIDATE to slice."
              gh issue edit "$CANDIDATE" --repo "$REPO" --add-label slice --remove-label slice-pending
            fi
          done
