summary: |
  Effect-TS service layers wrapping external dependencies (databases, key-value stores, email, etc.). Each service is a Context.Tag with a Live layer for real I/O and a Test layer for isolated unit testing. Services translate between Effect and external system APIs using typed errors (Data.TaggedError), with zero business logic — only I/O coordination.

patterns:
  - id: INFRA-P001
    title: "Database row to brand type conversion"
    description: "Create helper functions to bridge database rows to branded types, e.g. `const noteId = (id: string): NoteId => id as any as NoteId`. Encapsulate the type bridge in one place rather than scattering `as NoteId` casts throughout the file. Improves refactorability — if the conversion logic changes (e.g. validation added), one function change updates all call sites."

  - id: INFRA-P002
    title: "Effect service structure: Context.Tag + Live/Test layers"
    description: "Every external service follows Context.GenericTag for the interface, a makeXxxLive() factory that returns the Live layer, and a makeTestXxx() factory for the Test layer. This ensures consistent dependency injection, swappable implementations, and co-located testing without mocks."

conventions:
  - id: INFRA-C001
    title: "D1 types imported from d1-types.ts"
    rule: "Import D1Database and D1PreparedStatement from ./d1-types.ts — never redefine these interfaces in repository files or other services. Single source of truth prevents type drift."

  - id: INFRA-C002
    title: "One file per external system"
    rule: "Each external dependency (database, KV store, email, etc.) gets its own file. File names match the system: database.ts, kv-store.ts, email.ts. This avoids service sprawl and keeps dependencies clear."

  - id: INFRA-C003
    title: "Imports forbidden: ../shell/"
    rule: "Infra services must not import from ../shell/. Dependencies point inward only (core/ and other infra/ files). Shell orchestrates infra, not vice versa."
