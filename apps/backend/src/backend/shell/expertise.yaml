meta:
  domain: shell
  scope: domain
  updated: "2026-04-02"
  updated_by: "worker-backend"

summary: |
  Shell coordinates core business logic and infra services through Hono routes and Effect.gen handlers.
  Routes live in shell/routes/<name>.ts (one file per route group) with co-located tests. The sandwich pattern
  guides all coordinators: impure read (infra) → pure compute (core) → impure write (infra). Critical boundaries:
  effect-handler.ts is pure framework glue (no core/infra imports), api.ts is a thin registry (no handler logic),
  and Effect.runPromise only at handler boundaries. Brand types and framework effects require specific patterns to
  work with both development and Cloudflare Workers production runtimes.

patterns:
  - id: SHELL-P001
    title: "Brand type decoding via Schema.decodeSync"
    description: >
      Brand types (e.g., NoteId) cannot be instantiated directly with constructor syntax like `NoteId(value)`.
      Always decode using `Schema.decodeSync(NoteId)(value)` to validate and wrap the value. This ensures the brand
      type's validation logic runs and the value is properly typed. Constructor patterns will either fail at runtime
      or skip validation entirely.

gotchas:
  - id: SHELL-G001
    title: "Bun-specific APIs break Cloudflare Workers runtime"
    description: >
      Shell code runs on Cloudflare Workers V8 isolates, not Bun. Bun-specific APIs like `import.meta.dir`,
      `import.meta.file`, and `readFileSync` are unavailable at runtime and cause crashes. Similarly, `Bun.env`
      works in dev but is inaccessible in production. Move file I/O behind infra services or defer initialization
      to lazy getters triggered only in dev environments. Never import or use Bun APIs at module scope.

  - id: SHELL-G002
    title: "Effect.runSync/runPromise at module scope breaks sandwich architecture"
    description: >
      Running Effects at module scope (e.g., top-level `Effect.runPromise(...)`) executes immediately during
      load, breaking the sandwich pattern and making it impossible to inject test layers. Defer all Effect runs
      to handler boundaries or lazy getter functions called only when needed. Routes must wire effects at
      handler execution time, not at import time, so testApp can override real dependencies with test doubles.

conventions:
  - id: SHELL-C001
    title: "effect-handler.ts type casts are intentional framework code"
    description: >
      effect-handler.ts contains generic overload patterns that require explicit type casts (e.g., `as unknown as ...`)
      to satisfy Effect's generic constraints. These casts are framework plumbing, not violations of the no-`as` rule.
      The file is a pure adapter layer (no imports from core/ or infra/) and the casts bridge Effect's type system
      with Hono's request/response handling. Mark such casts with a comment explaining the generic context.
