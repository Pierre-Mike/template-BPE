meta:
  domain: backend-core
  scope: domain
  updated: "2026-04-02"
  updated_by: worker-backend-core

summary: |
  The core layer contains pure business logic with zero external dependencies.
  All functions accept data in and return Effect<A, E, never>, with no side effects,
  I/O, or use of Date/randomness. Validation happens once in core and is reused
  across infra and shell layers to eliminate duplication. Brand types from
  Effect-Schema require proper decoding before use.

patterns:
  - id: CORE-P001
    title: "Brand type construction via Schema.decodeSync"
    description: |
      Brand types created with Schema.String.pipe(Schema.brand("Name")) cannot
      be instantiated with direct constructor calls. Apply them using
      Schema.decodeSync(BrandType)(value), which validates and brands the value
      in one operation. This is the only safe way to construct branded values.

conventions:
  - id: CORE-C001
    title: "Core layer is pure — zero I/O, zero side effects"
    rule: |
      No Date(), crypto.randomUUID(), Math.random(), fetch, or any I/O in core/.
      All timestamps, IDs, and random values must be passed as parameters from
      shell/ or infra/. Functions return Effect<A, E, never> (no dependencies).
      Generate impure values at the boundary — shell/ or infra/ — and pass them
      down to pure core functions.

  - id: CORE-C002
    title: "Validation logic lives in core, called from infra and shell"
    rule: |
      Define all validation logic once in core/ using @effect/schema. Infra/
      and shell/ layers import and call these validators — never duplicate
      validation across layers. This ensures a single source of truth and
      prevents validation logic drift as code evolves.
