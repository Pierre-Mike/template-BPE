name = "template-bpe-frontend"
compatibility_date = "2025-03-17"

# ---------------------------------------------------------------------------
# ENVIRONMENT VARIABLES
# PUBLIC_API_URL is set per environment only (staging/production).
# Local development leaves it unset — pages fall back to http://localhost:8788.
# Do NOT set PUBLIC_API_URL in root [vars] — it breaks `astro dev` by routing
# SSR requests to the production backend instead of the local wrangler server.
# ---------------------------------------------------------------------------

[assets]
directory = "dist/client"

# ---------------------------------------------------------------------------
# ENVIRONMENT SEPARATION
# Use `wrangler deploy --env staging` or `wrangler deploy --env production`
# to target a specific environment. Each env block overrides the root config.
# ---------------------------------------------------------------------------

[env.staging]
name = "template-bpe-frontend-staging"

[env.staging.vars]
PUBLIC_API_URL = "https://staging-template-bpe-backend.workers.dev"

[env.production]
name = "template-bpe-frontend-production"

[env.production.vars]
PUBLIC_API_URL = "https://template-bpe-backend.workers.dev"
